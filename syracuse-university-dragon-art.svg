<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Artistic Syracuse University logo with dragon motif</title>
  <desc id="desc">An artistic rendering based on the official Syracuse University logo, framed by a stylized orange dragon and Chinese-inspired cloud motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081224"/>
      <stop offset="55%" stop-color="#0d1d36"/>
      <stop offset="100%" stop-color="#09111f"/>
    </linearGradient>
    <linearGradient id="dragonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb066"/>
      <stop offset="40%" stop-color="#f76900"/>
      <stop offset="100%" stop-color="#c84b00"/>
    </linearGradient>
    <linearGradient id="dragonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd58f" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f76900" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff4e8"/>
      <stop offset="100%" stop-color="#f5d6bd"/>
    </linearGradient>
    <filter id="panelShadow" x="-20%" y="-30%" width="140%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="dragonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ff8c2a" flood-opacity="0.35"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

